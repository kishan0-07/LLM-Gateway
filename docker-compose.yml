services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway_dev_pw
      POSTGRES_DB: gateway_db
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway -d gateway_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:8-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata: